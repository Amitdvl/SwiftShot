name: SwiftShot
options:
  bundleIdPrefix: com.swiftshot
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  defaultConfig: Release

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.swiftshot.app
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    INFOPLIST_FILE: Info.plist
    CODE_SIGN_ENTITLEMENTS: SwiftShot.entitlements
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: true

targets:
  SwiftShot:
    type: application
    platform: macOS
    sources:
      - path: SwiftShot
        excludes:
          - "Resources/Backgrounds/**"
          - "Resources/icon.icns"
      - path: SwiftShot/Resources/Backgrounds
        type: folder
        buildPhase: resources
    settings:
      base:
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_ENTITLEMENTS: SwiftShot.entitlements
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
    entitlements:
      path: SwiftShot.entitlements
